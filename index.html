<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Two Images</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            background: #ffffff;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }
        .image-container {
            position: relative;
            width: 390px;
            height: 422px;
        }
        img {
            width: 390px;
            height: 422px;
            object-fit: cover;
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            color: white;
            padding-top: 20px;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 25px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            font-family: Arial, sans-serif;
        }
        .title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .subtitle {
            font-size: 11px;
            line-height: 1.3;
            margin-bottom: 18px;
        }
        .paw-line {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .line {
            height: 1.5px;
            width: 55px;
            background: #4ECDC4;
        }
        .paw-svg {
            width: 28px;
            height: 28px;
            fill: #4ECDC4;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.6));
        }

        /* =============== HOLOGRAPHIC SOCIAL ICONS =============== */
        .holographic-stack {
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 24px;
          perspective: 1000px;
          margin-top: 4px;
        }

        .holographic-icon {
          position: relative;
          width: 68px;
          height: 68px;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
          transform-style: preserve-3d;
          color: #4ECDC4;
        }

        .holographic-icon svg {
          width: 36px;
          height: 36px;
          position: relative;
          z-index: 3;
          transition: all 0.3s ease;
          filter: drop-shadow(0 0 5px currentColor);
          fill: currentColor;
        }

        .holographic-ring {
          position: absolute;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          border: 2px solid #4ECDC4;
          border-top-color: transparent;
          border-bottom-color: transparent;
          animation: rotate 3s linear infinite;
          opacity: 0.7;
        }

        .holographic-particles {
          position: absolute;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          background: radial-gradient(
            circle,
            transparent 20%,
            #4ECDC4 20%,
            #4ECDC4 30%,
            transparent 30%,
            transparent 40%,
            #4ECDC4 40%,
            #4ECDC4 50%,
            transparent 50%
          );
          background-size: 15px 15px;
          opacity: 0;
          transition: opacity 0.3s ease;
        }

        .holographic-pulse {
          position: absolute;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          box-shadow: 0 0 15px #4ECDC4;
          opacity: 0;
          transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .holographic-icon:hover {
          transform: translateY(-10px) rotateX(20deg);
        }

        .holographic-icon:hover svg {
          transform: scale(1.2) rotate(10deg);
        }

        .holographic-icon:hover .holographic-particles {
          opacity: 0.4;
          animation: particles 3s linear infinite;
        }

        .holographic-icon:hover .holographic-pulse {
          opacity: 0.6;
          animation: pulse 2s ease-out infinite;
        }

        @keyframes rotate {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }

        @keyframes particles {
          from { background-position: 0 0; }
          to { background-position: 30px 30px; }
        }

        @keyframes pulse {
          0% { transform: scale(0.8); opacity: 0.5; }
          50% { transform: scale(1.1); opacity: 0.2; }
          100% { transform: scale(1.3); opacity: 0; }
        }

        /* =============== TAGLINE + CROWN =============== */
        .tagline-container {
          margin-top: 2px;
          text-align: center;
        }

        .tagline {
          font-size: 10px;
          font-style: italic;
          letter-spacing: 0.4px;
          opacity: 0.95;
          margin-bottom: 8px;
          line-height: 1.2;
        }

        .crown {
          width: 42px;
          height: 28px;
          fill: #FFD700;
          filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
          margin-bottom: 12px;
        }

        /* =============== CONTACT BUTTON =============== */
        .button-container {
          margin-top: 8px;
          margin-bottom: 18px;
        }

        .button {
          display: inline-block;
          padding: 12px 28px;
          border: 2px solid #4ECDC4;
          border-radius: 4px;
          transition: all 0.2s ease-in;
          position: relative;
          overflow: hidden;
          font-size: 17px;
          font-weight: 700;
          cursor: pointer;
          color: #4ECDC4;
          background: transparent;
          z-index: 1;
        }

        .button:before {
          content: "";
          position: absolute;
          left: 50%;
          transform: translateX(-50%) scaleY(1) scaleX(1.25);
          top: 100%;
          width: 140%;
          height: 180%;
          background-color: rgba(78, 205, 196, 0.15);
          border-radius: 50%;
          display: block;
          transition: all 0.5s 0.1s cubic-bezier(0.55, 0, 0.1, 1);
          z-index: -1;
        }

        .button:after {
          content: "";
          position: absolute;
          left: 55%;
          transform: translateX(-50%) scaleY(1) scaleX(1.45);
          top: 180%;
          width: 160%;
          height: 190%;
          background-color: #4ECDC4;
          border-radius: 50%;
          display: block;
          transition: all 0.5s 0.1s cubic-bezier(0.55, 0, 0.1, 1);
          z-index: -1;
        }

        .button:hover {
          color: white;
          border: 2px solid #4ECDC4;
        }

        .button:hover:before {
          top: -35%;
          background-color: #4ECDC4;
          transform: translateX(-50%) scaleY(1.3) scaleX(0.8);
        }

        .button:hover:after {
          top: -45%;
          background-color: #4ECDC4;
          transform: translateX(-50%) scaleY(1.3) scaleX(0.8);
        }
    </style>
</head>
